- id: ins_002
  category: insurance
  title: "Motor Insurance Claims Process"
  content: "To claim motor insurance: 1) Report accident to police, 2) Contact insurer within 24 hours, 3) Submit claim form with documents, 4) Wait for assessment."
  tags: ["claims", "process", "motor"]
  language: en

- id: ins_003
  category: insurance
  title: "Vehicle Insurance Requirements"
  content: "All vehicles in Rwanda must have valid third-party insurance. Penalties for driving without insurance include fines and vehicle impoundment."
  tags: ["requirements", "law", "penalties"]
  language: en

