- id: tour_license_001
  category: tourism
  topic: tourism_operating_license
  title: Tourism Operating License Overview
  content: "Tourism entities in Rwanda apply for a tourism operating license through the RDB Tourism Regulation portal. The platform provides license application services and access to licensed and graded tourism entities."
  fee: "RWF 80,000 non-refundable application fee"
  timeline: "RDB processes a complete license application within 15 days, subject to missing documents or inspection corrections."
  validity: "The tourism operating license does not expire, but entities must pass annual inspections to maintain it."
  source: "RDB Tourism Regulation FAQ"
  source_url: "https://tourismregulation.rw/en/faqs/"
  last_reviewed: "2026-06-20"
  tags: ["tourism", "license", "rdb", "operating-license"]
  language: en

- id: tour_license_002
  category: tourism
  topic: eligible_tourism_entities
  title: Eligible Tourism Entity Categories
  content: "Owners or operators of accommodation establishments, restaurants, bars, nightclubs, tour operators, tour guides, travel agents, tourism information centers, museums, and cultural tourism entities can apply for a tourism operating license."
  entity_types:
    - accommodation
    - restaurant_bar_nightclub
    - tour_operator
    - travel_agent
    - tour_guide
    - tourism_information_center
    - cultural_tourism_museum
  source: "RDB Tourism Regulation FAQ"
  source_url: "https://tourismregulation.rw/en/faqs/"
  last_reviewed: "2026-06-20"
  tags: ["tourism", "entity-types", "license", "eligibility"]
  language: en

- id: tour_license_003
  category: tourism
  topic: tourism_license_process
  title: Tourism License Application Process
  steps:
    - "Register or log in on the RDB Tourism Regulation portal."
    - "Select the correct tourism entity category."
    - "Complete the online application."
    - "Upload the required supporting documents for the entity type."
    - "Pay the non-refundable application fee."
    - "Prepare for inspection by an authorized RDB inspector."
    - "Fix any missing documents or inspection issues if RDB requests corrections."
    - "Receive the operating license after approval."
  source: "RDB Tourism Regulation FAQ"
  source_url: "https://tourismregulation.rw/en/faqs/"
  last_reviewed: "2026-06-20"
  tags: ["tourism", "license", "application", "inspection"]
  language: en

